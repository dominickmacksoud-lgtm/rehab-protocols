name: Link Health Check

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 09:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI → Actions tab

permissions:
  issues: write
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run link checker
        run: python check-links.py --json
        continue-on-error: true

      - name: Parse report and build issue body
        id: report
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from pathlib import Path

          path = Path("link-report.json")
          if not path.exists():
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write("has_problems=false\n")
                  fh.write("run_date=unknown\n")
              print("No link-report.json found.")
              sys.exit(0)

          report = json.loads(path.read_text())
          broken    = report.get("broken", [])
          warn      = report.get("warn", [])
          redirects = report.get("redirects", [])
          timeouts  = report.get("timeouts", [])
          errors    = report.get("errors", [])
          total     = report.get("total", 0)
          run_date  = report.get("date", "unknown")

          problem_count = len(broken) + len(warn) + len(timeouts) + len(errors)

          lines = []
          lines.append(f"**Run date:** {run_date}  ")
          lines.append(f"**Total links checked:** {total}  ")
          lines.append(f"**Broken (4xx/5xx):** {len(broken)}  ")
          lines.append(f"**Warn — 403/possibly bot-blocked:** {len(warn)}  ")
          lines.append(f"**Timeout:** {len(timeouts)}  ")
          lines.append(f"**Network error:** {len(errors)}  ")
          lines.append(f"**Redirected (URL moved — update CSV):** {len(redirects)}  ")
          lines.append("")

          def table(rows, label):
              if not rows:
                  return
              lines.append(f"### {label}")
              lines.append("")
              lines.append("| Surgery / Condition | Source Org | Status | URL |")
              lines.append("|---|---|---|---|")
              for r in rows:
                  s = r.get("status", "")
                  if r.get("code"):
                      s += f" ({r['code']})"
                  lines.append(f"| {r.get('surgery_type','')} | {r.get('source_org','')} | {s} | {r.get('url','')} |")
              lines.append("")

          table(broken,    "Broken Links (4xx / 5xx)")
          table(warn,      "Possible Bot-Blocking (403) — Verify Manually")
          table(timeouts,  "Timeouts — Server Unreachable")
          table(errors,    "Network Errors")
          table(redirects, "Redirected URLs — Update CSV")

          lines.append("---")
          lines.append("### How to fix")
          lines.append("")
          lines.append("1. For each broken link, find a working replacement (Wayback Machine, institution site search, or contact source org).")
          lines.append("2. Update `protocols-import.csv` or `guidelines-import.csv`.")
          lines.append("3. Run `python generate-protocols.py` and/or `python generate-guidelines.py`.")
          lines.append("4. Commit and push — site redeploys in ~2 minutes.")
          lines.append("")
          lines.append("*403 warnings: open the URL in a browser. If it loads, the server is blocking the bot checker and the link is fine. If it 404s, treat it as broken.*")
          lines.append("")
          lines.append("*Generated by the [link-check workflow](../../actions/workflows/link-check.yml)*")

          body = "\n".join(lines)
          delimiter = "BODY_EOF"

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"has_problems={'true' if problem_count > 0 else 'false'}\n")
              fh.write(f"run_date={run_date}\n")
              fh.write(f"issue_body<<{delimiter}\n{body}\n{delimiter}\n")
          PYEOF

      - name: Find existing broken-link issue
        id: find_issue
        if: steps.report.outputs.has_problems == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: "open",
              labels: "link-check",
            });
            const existing = issues.data.find(i =>
              i.title.startsWith("🔗 Broken Protocol Links Detected")
            );
            return existing ? existing.number : null;

      - name: Create or update broken-link issue
        if: steps.report.outputs.has_problems == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔗 Broken Protocol Links Detected — ${{ steps.report.outputs.run_date }}`;
            const body  = `${{ steps.report.outputs.issue_body }}`;
            const issueNumber = ${{ steps.find_issue.outputs.result || 'null' }};

            if (issueNumber) {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issueNumber,
                title:        title,
                body:         body,
              });
              console.log(`Updated issue #${issueNumber}`);
            } else {
              const created = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  title,
                body:   body,
                labels: ["link-check"],
              });
              console.log(`Created issue #${created.data.number}`);
            }

      - name: Close broken-link issue if all links are healthy
        if: steps.report.outputs.has_problems == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: "open",
              labels: "link-check",
            });
            for (const issue of issues.data) {
              if (issue.title.startsWith("🔗 Broken Protocol Links Detected")) {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: issue.number,
                  body:         `All ${{ steps.report.outputs.run_date }} links passed. Closing automatically.`,
                });
                await github.rest.issues.update({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: issue.number,
                  state:        "closed",
                });
                console.log(`Closed issue #${issue.number}`);
              }
            }
